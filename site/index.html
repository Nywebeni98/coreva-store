<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Coreva Online Store</title>
  <meta name="description" content="Sign in to Coreva Online Store to shop premium fragrances and essentials.">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="assets/logo-shop.png" type="image/png">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="assets/logo-signin.png" alt="Coreva Online Store">
      </div>

      <div class="auth-error" id="auth-error"></div>

      <!-- Google Sign In -->
      <button class="google-btn" onclick="handleGoogleSignIn()">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <div class="auth-divider">or continue with email</div>

      <!-- Auth Method Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-password" onclick="switchTab('password')">Password</button>
        <button class="auth-tab" id="tab-otp" onclick="switchTab('otp')">Email OTP</button>
      </div>

      <!-- Password Sign In -->
      <div id="view-signin">
        <div class="email-form">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="signin-email" placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="signin-password" placeholder="Enter your password">
          </div>
          <button class="primary-btn" onclick="handleEmailSignIn()">Sign In</button>
        </div>
        <p class="auth-switch">Don't have an account? <a onclick="showSignUp()">Create one</a></p>
      </div>

      <!-- Sign Up Form -->
      <div id="view-signup" style="display:none;">
        <div class="email-form">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="signup-name" placeholder="Your name">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="signup-email" placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="signup-password" placeholder="Create a password (min 6 chars)">
          </div>
          <button class="primary-btn" onclick="handleEmailSignUp()">Create Account</button>
        </div>
        <p class="auth-switch">Already have an account? <a onclick="showSignIn()">Sign in</a></p>
      </div>

      <!-- OTP Step 1: Enter Email -->
      <div id="view-otp-email" style="display:none;">
        <div class="email-form">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="otp-email" placeholder="your@email.com">
          </div>
          <button class="primary-btn" onclick="handleSendOTP()">Send OTP Code</button>
        </div>
        <p class="auth-hint">We'll send a 6-digit code to your email.</p>
      </div>

      <!-- OTP Step 2: Enter Code -->
      <div id="view-otp-verify" style="display:none;">
        <div class="email-form">
          <div class="form-group">
            <label>6-Digit OTP Code</label>
            <input type="text" id="otp-code" placeholder="Enter the code from your email" maxlength="6" inputmode="numeric">
          </div>
          <button class="primary-btn" onclick="handleVerifyOTP()">Verify & Sign In</button>
          <button class="secondary-btn" onclick="backToOTPEmail()" style="margin-top:8px;">Use different email</button>
        </div>
        <p class="auth-hint" id="otp-email-hint"></p>
      </div>

      <p class="auth-loading" id="auth-loading">Please wait...</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    var currentOTPEmail = '';

    document.addEventListener('DOMContentLoaded', async function() {
      await redirectIfSignedIn();
    });

    function showError(msg) {
      var el = document.getElementById('auth-error');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }

    function setLoading(on) {
      document.getElementById('auth-loading').style.display = on ? 'block' : 'none';
    }

    function hideAllViews() {
      ['view-signin','view-signup','view-otp-email','view-otp-verify'].forEach(function(id) {
        document.getElementById(id).style.display = 'none';
      });
    }

    function switchTab(tab) {
      showError('');
      document.getElementById('tab-password').classList.toggle('active', tab === 'password');
      document.getElementById('tab-otp').classList.toggle('active', tab === 'otp');
      hideAllViews();
      if (tab === 'password') {
        document.getElementById('view-signin').style.display = 'block';
      } else {
        document.getElementById('view-otp-email').style.display = 'block';
      }
    }

    function showSignUp() {
      showError('');
      hideAllViews();
      document.getElementById('view-signup').style.display = 'block';
    }

    function showSignIn() {
      showError('');
      hideAllViews();
      document.getElementById('view-signin').style.display = 'block';
      document.getElementById('tab-password').classList.add('active');
      document.getElementById('tab-otp').classList.remove('active');
    }

    function backToOTPEmail() {
      showError('');
      document.getElementById('view-otp-verify').style.display = 'none';
      document.getElementById('view-otp-email').style.display = 'block';
    }

    async function handleGoogleSignIn() {
      showError('');
      setLoading(true);
      var error = await signInWithGoogle();
      if (error) {
        setLoading(false);
        showError('Google sign in failed. Please try again.');
      }
    }

    async function handleEmailSignIn() {
      showError('');
      var email = document.getElementById('signin-email').value.trim();
      var password = document.getElementById('signin-password').value;
      if (!email || !password) { showError('Please enter your email and password.'); return; }
      setLoading(true);
      var result = await signInWithEmail(email, password);
      setLoading(false);
      if (result.error) {
        showError(result.error.message || 'Sign in failed. Please try again.');
      } else {
        window.location.href = 'shop.html';
      }
    }

    async function handleEmailSignUp() {
      showError('');
      var name = document.getElementById('signup-name').value.trim();
      var email = document.getElementById('signup-email').value.trim();
      var password = document.getElementById('signup-password').value;
      if (!name || !email || !password) { showError('Please fill in all fields.'); return; }
      if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }
      setLoading(true);
      var result = await signUpWithEmail(name, email, password);
      setLoading(false);
      if (result.error) {
        showError(result.error.message || 'Sign up failed. Please try again.');
      } else {
        showError('');
        alert('Account created! Please check your email to confirm, then sign in.');
        showSignIn();
      }
    }

    async function handleSendOTP() {
      showError('');
      var email = document.getElementById('otp-email').value.trim();
      if (!email) { showError('Please enter your email address.'); return; }
      setLoading(true);
      var result = await sendOTP(email);
      setLoading(false);
      if (result.error) {
        showError(result.error.message || 'Failed to send OTP. Please try again.');
      } else {
        currentOTPEmail = email;
        document.getElementById('otp-email-hint').textContent = 'OTP sent to ' + email + '. Check your inbox or spam folder.';
        document.getElementById('view-otp-email').style.display = 'none';
        document.getElementById('view-otp-verify').style.display = 'block';
      }
    }

    async function handleVerifyOTP() {
      showError('');
      var token = document.getElementById('otp-code').value.trim();
      if (!token || token.length !== 6) { showError('Please enter the 6-digit code.'); return; }
      setLoading(true);
      var result = await verifyOTP(currentOTPEmail, token);
      setLoading(false);
      if (result.error) {
        showError(result.error.message || 'Invalid code. Please try again.');
      } else {
        window.location.href = 'shop.html';
      }
    }
  </script>
</body>
</html>
